<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Ad Block Ultimate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #0f0f0f; color: #f1f1f1; }
    .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; border-bottom: 1px solid #272727; }
    .logo { width: 28px; height: 28px; background: #cc0000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #fff; flex-shrink: 0; }
    .title { font-weight: 700; font-size: 14px; color: #fff; }
    .subtitle { font-size: 11px; color: #aaa; margin-top: 1px; }
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #1a1a1a; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #00b87a; box-shadow: 0 0 6px #00b87a; flex-shrink: 0; }
    .status-text { font-size: 12px; color: #ccc; }
    .section { padding: 10px 16px; border-bottom: 1px solid #1e1e1e; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 8px; }
    .feature { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .check { width: 16px; height: 16px; background: #00b87a22; border: 1px solid #00b87a55; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .check svg { color: #00b87a; }
    .feature-label { color: #ccc; font-size: 12px; }
    .footer { padding: 10px 16px; font-size: 10px; color: #555; text-align: center; line-height: 1.4; }
    .footer a { color: #888; text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: #ccc; text-decoration: underline; }
    .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 18px; }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #00b87a; }
    input:checked + .slider:before { transform: translateX(14px); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">▶</div>
    <div>
      <div class="title">YT Ad Block Ultimate</div>
      <div class="subtitle">All ads removed</div>
    </div>
  </div>
  <div class="status-bar">
    <div style="display: flex; align-items: center; gap: 8px; flex-grow: 1;">
      <div class="dot" id="status-dot"></div>
      <div class="status-text" id="status-text">Active and blocking on YouTube</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-switch" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="section">
    <div class="section-title">Blocking</div>
    <div class="feature"><div class="check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></div><div class="feature-label">Pre-roll &amp; mid-roll video ads</div></div>
    <div class="feature"><div class="check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></div><div class="feature-label">Homepage &amp; sidebar banners</div></div>
    <div class="feature"><div class="check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></div><div class="feature-label">Promoted / sponsored videos</div></div>
    <div class="feature"><div class="check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></div><div class="feature-label">Anti-adblock enforcement wall</div></div>
    <div class="feature"><div class="check"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></div><div class="feature-label">Overlay &amp; display ads</div></div>
  </div>
  <div class="footer">
    YouTube AdBlock by Momenzi<br>
    <a href="https://github.com/Momenzi" target="_blank">check GitHub for more info</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
